<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TXT Auto Scroller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #toolbar {
            background: #16213e;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
            z-index: 10;
        }

        #toolbar label {
            font-size: 14px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #fileInput {
            display: none;
        }

        .btn {
            background: #0f3460;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn:hover {
            background: #1a4a7a;
        }

        .btn.active {
            background: #e94560;
        }

        .btn.active:hover {
            background: #c73a54;
        }

        #speedControl {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        #speedControl input[type="range"] {
            width: 100px;
            accent-color: #e94560;
            background: #0f3460;
            height: 4px;
            border-radius: 2px;
        }

        #speedLabel {
            font-size: 14px;
            color: #aaa;
            min-width: 36px;
            text-align: center;
        }

        #textContainer {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #1a1a2e;
            padding: 20px 16px;
            touch-action: none;
        }

        #textContent {
            font-size: 18px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 4px 0;
            will-change: transform;
            user-select: none;
            -webkit-user-select: none;
        }

        #status {
            background: #16213e;
            padding: 8px 16px;
            font-size: 13px;
            color: #888;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #0f3460;
            flex-shrink: 0;
        }

        #status span {
            color: #aaa;
        }

        @media (max-width: 480px) {
            #toolbar {
                padding: 8px 12px;
                gap: 6px;
            }
            .btn {
                padding: 6px 12px;
                font-size: 13px;
            }
            #textContent {
                font-size: 16px;
                line-height: 1.7;
            }
            #speedControl input[type="range"] {
                width: 70px;
            }
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="fileInput">
            📂 Choose .txt
            <input type="file" id="fileInput" accept=".txt">
        </label>

        <button class="btn" id="playBtn">▶ Play</button>
        <button class="btn" id="resetBtn">⟳ Reset</button>

        <div id="speedControl">
            <span style="font-size:14px; color:#888;">🐢</span>
            <input type="range" id="speedSlider" min="1" max="10" value="4">
            <span style="font-size:14px; color:#888;">🐇</span>
            <span id="speedLabel">4</span>
        </div>
    </div>

    <div id="textContainer">
        <div id="textContent">
            <p style="color:#666; text-align:center; margin-top:40%;">
                📄 Load a .txt file to start.<br>
                Tap "▶ Play" to auto-scroll.<br>
                👆 Drag up/down to scroll manually
            </p>
        </div>
    </div>

    <div id="status">
        <span id="fileName">No file loaded</span>
        <span id="position">Line: 0 / 0</span>
    </div>

    <script>
        // ============================================================
        //  DOM References
        // ============================================================
        const container = document.getElementById('textContainer');
        const textContent = document.getElementById('textContent');
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedLabel = document.getElementById('speedLabel');
        const fileNameSpan = document.getElementById('fileName');
        const positionSpan = document.getElementById('position');

        // ============================================================
        //  State
        // ============================================================
        let isPlaying = false;
        let animationId = null;
        let scrollOffset = 0;
        let containerHeight = 0;
        let contentHeight = 0;
        let maxScroll = 0;
        let speedPixelsPerFrame = 0.12;

        // Manual scroll state
        let isDragging = false;
        let startY = 0;
        let startOffset = 0;
        let lastDragY = 0;
        let lastDragTime = 0;
        let dragVelocity = 0;
        let momentumId = null;
        let momentumActive = false;

        // ============================================================
        //  Speed mapping - EVEN LOWER RANGE: 0.02 to 0.35 px/frame
        // ============================================================
        function updateSpeed() {
            const val = parseInt(speedSlider.value, 10);
            speedLabel.textContent = val;
            speedPixelsPerFrame = 0.02 + (val / 10) * 0.33;
        }
        speedSlider.addEventListener('input', updateSpeed);
        updateSpeed();

        // ============================================================
        //  Read file
        // ============================================================
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (isPlaying) togglePlay();
            stopMomentum();

            const reader = new FileReader();
            reader.onload = function(ev) {
                textContent.textContent = ev.target.result;
                fileNameSpan.textContent = file.name;
                scrollOffset = 0;
                textContent.style.transform = 'translateY(0px)';
                // Force layout then update
                requestAnimationFrame(() => {
                    updateDimensions();
                    updatePositionDisplay();
                });
            };
            reader.readAsText(file, 'UTF-8');
        });

        // ============================================================
        //  Update dimensions - FIXED: accounts for container padding
        // ============================================================
        function updateDimensions() {
            const containerStyle = getComputedStyle(container);
            const paddingTop = parseFloat(containerStyle.paddingTop) || 0;
            const paddingBottom = parseFloat(containerStyle.paddingBottom) || 0;
            
            // Available height = container height minus padding
            const availableHeight = container.clientHeight - paddingTop - paddingBottom;
            
            // Content height is the actual scroll height
            contentHeight = textContent.scrollHeight;
            
            // Max scroll = content height minus what fits in the viewport
            // This ensures the LAST line of content can reach the BOTTOM of the visible area
            maxScroll = Math.max(0, contentHeight - availableHeight);
            
            if (maxScroll <= 0 && isPlaying) togglePlay();
            
            // Clamp current scroll position
            if (scrollOffset > maxScroll) {
                applyScroll(maxScroll);
            }
        }

        // ============================================================
        //  Position display - FIXED: more accurate line counting
        // ============================================================
        function updatePositionDisplay() {
            if (contentHeight === 0 || maxScroll === 0) {
                positionSpan.textContent = 'Line: 0 / 0';
                return;
            }
            
            // Calculate approximate line height from content
            const tempDiv = document.createElement('div');
            tempDiv.style.cssText = 'position:absolute;visibility:hidden;font-size:18px;line-height:1.8;white-space:pre-wrap;';
            tempDiv.textContent = 'Test';
            document.body.appendChild(tempDiv);
            const lineHeight = tempDiv.offsetHeight || 28;
            document.body.removeChild(tempDiv);
            
            const totalLines = Math.floor(contentHeight / lineHeight);
            const currentLine = Math.floor(scrollOffset / lineHeight);
            positionSpan.textContent = `Line: ${Math.min(currentLine + 1, totalLines)} / ${totalLines}`;
        }

        // ============================================================
        //  Apply scroll offset - HARD CLAMP (no bounce)
        // ============================================================
        function applyScroll(offset) {
            // Strict clamping - NO OVERSCROLL ALLOWED
            if (offset < 0) offset = 0;
            if (offset > maxScroll) offset = maxScroll;
            
            scrollOffset = offset;
            textContent.style.transform = `translateY(-${scrollOffset}px)`;
            updatePositionDisplay();
        }

        // ============================================================
        //  Auto-scroll loop - STARTS FROM CURRENT POSITION
        // ============================================================
        function scrollStep(timestamp) {
            if (!isPlaying) return;

            let newOffset = scrollOffset + speedPixelsPerFrame;

            if (newOffset >= maxScroll) {
                applyScroll(maxScroll);
                togglePlay();
                return;
            }

            applyScroll(newOffset);
            animationId = requestAnimationFrame(scrollStep);
        }

        // ============================================================
        //  Play / Pause - DOES NOT RESET TO TOP
        // ============================================================
        function togglePlay() {
            if (isPlaying) {
                isPlaying = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                playBtn.textContent = '▶ Play';
                playBtn.classList.remove('active');
            } else {
                if (maxScroll <= 0) return;
                // If at the bottom, stay at bottom
                isPlaying = true;
                playBtn.textContent = '⏸ Pause';
                playBtn.classList.add('active');
                animationId = requestAnimationFrame(scrollStep);
            }
        }

        playBtn.addEventListener('click', togglePlay);

        // ============================================================
        //  Reset - ONLY WAY TO GO BACK TO TOP
        // ============================================================
        resetBtn.addEventListener('click', function() {
            if (isPlaying) togglePlay();
            stopMomentum();
            applyScroll(0);
            updateDimensions();
        });

        // ============================================================
        //  Stop momentum
        // ============================================================
        function stopMomentum() {
            if (momentumId) {
                cancelAnimationFrame(momentumId);
                momentumId = null;
            }
            momentumActive = false;
        }

        // ============================================================
        //  MANUAL SCROLL - Touch Events
        // ============================================================
        container.addEventListener('touchstart', function(e) {
            if (isPlaying) togglePlay();
            stopMomentum();

            const touch = e.touches[0];
            isDragging = true;
            startY = touch.clientY;
            startOffset = scrollOffset;
            lastDragY = touch.clientY;
            lastDragTime = Date.now();
            dragVelocity = 0;
        }, { passive: true });

        container.addEventListener('touchmove', function(e) {
            if (!isDragging) return;
            const touch = e.touches[0];
            const deltaY = startY - touch.clientY;
            let newOffset = startOffset + deltaY;

            // Track velocity
            const now = Date.now();
            const dt = now - lastDragTime;
            if (dt > 0) {
                dragVelocity = (lastDragY - touch.clientY) / dt;
            }
            lastDragY = touch.clientY;
            lastDragTime = now;

            applyScroll(newOffset);
        }, { passive: true });

        container.addEventListener('touchend', function(e) {
            if (!isDragging) return;
            isDragging = false;

            // Only start momentum if velocity is significant and not at boundaries
            if (Math.abs(dragVelocity) > 0.3) {
                // Check if we're already at a boundary
                if ((scrollOffset <= 0 && dragVelocity < 0) || 
                    (scrollOffset >= maxScroll && dragVelocity > 0)) {
                    return;
                }
                startMomentum(dragVelocity);
            }
        }, { passive: true });

        container.addEventListener('touchcancel', function() {
            isDragging = false;
            stopMomentum();
        }, { passive: true });

        // ============================================================
        //  MANUAL SCROLL - Mouse Events
        // ============================================================
        let mouseDown = false;
        let mouseStartY = 0;
        let mouseStartOffset = 0;

        container.addEventListener('mousedown', function(e) {
            if (isPlaying) togglePlay();
            stopMomentum();

            mouseDown = true;
            mouseStartY = e.clientY;
            mouseStartOffset = scrollOffset;
            container.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', function(e) {
            if (!mouseDown) return;
            const deltaY = mouseStartY - e.clientY;
            applyScroll(mouseStartOffset + deltaY);
        });

        document.addEventListener('mouseup', function() {
            if (mouseDown) {
                mouseDown = false;
                container.style.cursor = 'default';
            }
        });

        // ============================================================
        //  Momentum scrolling - NO BOUNCE, HARD STOPS
        // ============================================================
        function startMomentum(velocity) {
            stopMomentum();
            
            let currentVelocity = velocity * 180;
            const friction = 0.975;
            momentumActive = true;

            function step() {
                if (!momentumActive) return;
                
                // Stop if very slow
                if (Math.abs(currentVelocity) < 0.05) {
                    momentumActive = false;
                    momentumId = null;
                    return;
                }

                let newOffset = scrollOffset + currentVelocity;

                // HARD STOP at boundaries - NO BOUNCE
                if (newOffset < 0) {
                    applyScroll(0);
                    momentumActive = false;
                    momentumId = null;
                    return;
                }
                
                if (newOffset > maxScroll) {
                    applyScroll(maxScroll);
                    momentumActive = false;
                    momentumId = null;
                    return;
                }

                applyScroll(newOffset);
                currentVelocity *= friction;

                // Stop if velocity is negligible
                if (Math.abs(currentVelocity) < 0.05) {
                    momentumActive = false;
                    momentumId = null;
                    return;
                }

                momentumId = requestAnimationFrame(step);
            }

            momentumId = requestAnimationFrame(step);
        }

        // ============================================================
        //  Handle window resize
        // ============================================================
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                updateDimensions();
                if (scrollOffset > maxScroll) applyScroll(maxScroll);
                updatePositionDisplay();
            }, 200);
        });

        window.addEventListener('visualViewport', () => {
            setTimeout(() => {
                updateDimensions();
                if (scrollOffset > maxScroll) applyScroll(maxScroll);
                updatePositionDisplay();
            }, 300);
        });

        // ============================================================
        //  Tap on text = toggle play
        // ============================================================
        container.addEventListener('click', function(e) {
            if (isDragging || mouseDown) return;
            if (textContent.textContent && textContent.textContent.includes('Load a .txt')) return;
            if (maxScroll > 0) {
                togglePlay();
            }
        });

        // ============================================================
        //  Init
        // ============================================================
        setTimeout(updateDimensions, 100);
    </script>

</body>
</html>
